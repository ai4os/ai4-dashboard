name: Build ai4-dashboard image (reusable)

on:
  workflow_call:
    inputs:
      tenant:
        type: string
        required: true
      environment:
        type: string
        required: true
      webhook_url:
        type: string
        required: false
        default: ''
    secrets:
      HARBOR_URL:
        required: true
      HARBOR_USERNAME:
        required: true
      HARBOR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      KEYCLOAK_SECRET:
        required: true
      HF_CLIENT_SECRET:
        required: true
      WEBHOOK_SECRET:
        required: false
      WEBHOOK_PAYLOAD:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        run: |
          echo "TAG=${{ github.ref_name }}-${{ inputs.tenant }}-${{ inputs.environment }}" >> $GITHUB_ENV

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inject Hugging Face client secret
        run: |
          sed -i "s/huggingFaceClientSecret: ''/huggingFaceClientSecret: '${{ secrets.HF_CLIENT_SECRET }}'/" \
            src/environments/environment.production.ts

      - name: Inject Keycloak secret
        run: |
          sed -i "s/dummyClientSecret: '.*'/dummyClientSecret: '${{ secrets.KEYCLOAK_SECRET }}'/" \
            src/app/core/services/auth/auth.config.ts

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ inputs.environment }}
          push: true
          build-args: TENANT=${{ inputs.tenant }}
          tags: |
            ${{ secrets.HARBOR_URL }}/ai4os/ai4-dashboard:${{ env.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai4-dashboard:${{ env.TAG }}
          provenance: false

      - name: Deploy webhook
        if: inputs.webhook_url != ''
        env:
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PAYLOAD: ${{ secrets.WEBHOOK_PAYLOAD }}
        run: |
          HASH=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "$SECRET" | sed 's/^.* //')
          curl -X POST "${{ inputs.webhook_url }}" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature: sha1=$HASH" \
            -d "$PAYLOAD"