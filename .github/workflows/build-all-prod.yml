name: Build all tenants — production

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: ai4eosc
            webhook_url: https://webhooks.cloud.ai4-dashboard/hooks/deploy-dashboard-ai4eosc-prod
          - tenant: imagine
            webhook_url: https://webhooks.cloud.ai4-dashboard/hooks/deploy-dashboard-imagine-prod
          - tenant: ai4life
            webhook_url: https://webhooks.cloud.ai4-dashboard/hooks/deploy-dashboard-ai4life-prod
          - tenant: kmd4eosc
            webhook_url: https://webhooks.cloud.ai4-dashboard/hooks/deploy-dashboard-kmd4eosc-prod
          - tenant: tutorials
            webhook_url: https://webhooks.cloud.ai4-dashboard/hooks/deploy-dashboard-tutorials-prod
    uses: ./.github/workflows/_build-reusable.yml
    with:
      tenant: ${{ matrix.tenant }}
      environment: prod
      webhook_url: ${{ matrix.webhook_url }}
    secrets: inherit