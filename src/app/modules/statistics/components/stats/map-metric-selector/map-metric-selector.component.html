<div class="pill-group">
    @for (m of metrics; track m) {
        <button
            class="pill-group__btn"
            [class.pill-group__btn--active]="active === m.key"
            (click)="select(m.key)"
        >
            <mat-icon class="pill-group__icon">{{ m.icon }}</mat-icon>
            {{ m.label }}
        </button>
    }
</div>
