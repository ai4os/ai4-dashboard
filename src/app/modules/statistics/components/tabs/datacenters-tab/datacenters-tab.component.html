<div class="main-container">
    <div id="map" class="map"></div>
    <div id="popup" class="ol-popup">
        <div id="popup-content"></div>
    </div>

    <mat-drawer #drawer class="drawer" mode="side" position="end">
        <!-- Header -->
        <div class="drawer-header">
            <span class="drawer-header__title">
                {{ selectedDatacenter?.name }}
            </span>
            <span class="drawer-dc-info__loc">
                <span class="drawer-dc-info__flag">
                    {{ selectedDatacenter?.country | countryFlag }}
                </span>
                {{ selectedDatacenter?.country }}
            </span>
        </div>

        <!-- Env metrics grid -->
        <div class="env-grid">
            <app-stats-reduced-card
                [label]="'DASHBOARD.STATS-TITLES.PUE' | translate"
                icon="bolt"
                [value]="selectedDatacenter?.PUE ?? '—'"
                [tooltip]="'DASHBOARD.PUE-INFO' | translate"
            />
            <app-stats-reduced-card
                [label]="'DASHBOARD.STATS-TITLES.JOBS-NUM' | translate"
                icon="task"
                [value]="jobsNum"
                unit="running"
            />
            <app-stats-reduced-card
                [label]="'DASHBOARD.STATS-TITLES.ENERGY-QUALITY' | translate"
                icon="eco"
                [value]="selectedDatacenter?.energy_quality ?? '—'"
                unit="g CO₂/kWh"
                [tooltip]="'DASHBOARD.ENERGY-INFO' | translate"
            />
            <app-stats-reduced-card
                [label]="
                    'DASHBOARD.STATS-TITLES.ENERGY-WATER-USAGE' | translate
                "
                icon="water_drop"
                [value]="selectedDatacenter?.energy_water_usage ?? '—'"
                unit="l/kWh"
                [tooltip]="'DASHBOARD.ENERGY-WATER-INFO' | translate"
            />
        </div>

        <!-- Resource bars -->
        <app-resources-card
            [usedCpu]="usedCpuNum"
            [totalCpu]="totalCpuNum"
            [usedMem]="Math.trunc(usedMemory)"
            [totalMem]="Math.trunc(totalMemory)"
            [memUnit]="ramUnit"
            [usedDisk]="Math.trunc(usedDisk)"
            [totalDisk]="Math.trunc(totalDisk)"
            [diskUnit]="diskUnit"
            [usedGpu]="usedGpuNum"
            [totalGpu]="totalGpuNum"
        />
    </mat-drawer>
</div>
