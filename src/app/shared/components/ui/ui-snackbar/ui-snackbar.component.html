<div class="ui-snackbar" [ngClass]="'ui-snackbar--' + data.variant">
    <mat-icon class="ui-snackbar__icon">{{ icon }}</mat-icon>

    <span class="ui-snackbar__text">{{ data.text }}</span>

    @if (data.dismissible !== false) {
        <mat-icon class="ui-snackbar__close" (click)="dismiss()">
            close
        </mat-icon>
    }
</div>
