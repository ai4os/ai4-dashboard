<div class="ui-list-card" [class]="'ui-list-card--' + theme">
    <div
        class="ui-list-card__title"
        [matTooltip]="tooltip ?? ''"
        [matTooltipDisabled]="!tooltip"
        matTooltipClass="ui-tooltip"
    >
        {{ title }}
    </div>

    <div class="ui-list-card__content">
        <ng-content></ng-content>
    </div>

    @if (suffixText) {
        <div class="ui-list-card__suffix" [innerHTML]="suffixText"></div>
    }
</div>
